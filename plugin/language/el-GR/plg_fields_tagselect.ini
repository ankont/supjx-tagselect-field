PLG_FIELDS_TAGSELECT="Πεδία - Επιλογή Ετικετών"
PLG_FIELDS_TAGSELECT_LABEL="Tag Select (%s)"
PLG_FIELDS_TAGSELECT_XML_DESCRIPTION="Προσθέτει τον custom field type tagselect για επιλογή Joomla tags με προαιρετικό περιορισμό σε πολλαπλά branches, επιλογή μόνο leaf tags και ελεγχόμενη δημιουργία νέων tags."
PLG_FIELDS_TAGSELECT_FIELD_MULTIPLE_LABEL="Να επιτρέπεται επιλογή πολλαπλών ετικετών"
PLG_FIELDS_TAGSELECT_FIELD_MULTIPLE_DESC="Όταν είναι ενεργό, ο editor μπορεί να επιλέγει περισσότερες από μία υπάρχουσες ετικέτες."
PLG_FIELDS_TAGSELECT_FIELD_MODE_LABEL="Τρόπος επιλογής"
PLG_FIELDS_TAGSELECT_FIELD_MODE_DESC="Το AJAX mode είναι προτιμότερο. Όταν ενεργοποιούνται περιορισμοί subtree ή leaf-only, το field χρησιμοποιεί ασφαλές server-filtered option set ώστε ο editor να βλέπει μόνο τις επιτρεπτές ετικέτες."
PLG_FIELDS_TAGSELECT_FIELD_MODE_OPTION_AJAX="AJAX (προτιμότερο)"
PLG_FIELDS_TAGSELECT_FIELD_MODE_OPTION_NESTED="Nested"
PLG_FIELDS_TAGSELECT_FIELD_ROOT_PARENT_ID_LABEL="Ρίζες περιορισμού"
PLG_FIELDS_TAGSELECT_FIELD_ROOT_PARENT_ID_DESC="Προαιρετικό. Περιορίζει το field σε ένα ή περισσότερα branches του δέντρου tags. Αυτός ο selector ακολουθεί το ίδιο mode με το ίδιο το field. Αν μείνει κενό, το field βλέπει όλο το tag tree."
PLG_FIELDS_TAGSELECT_FIELD_INCLUDE_DESCENDANTS_LABEL="Συμπερίληψη απογόνων"
PLG_FIELDS_TAGSELECT_FIELD_INCLUDE_DESCENDANTS_DESC="Όταν είναι ενεργό, επιτρέπονται όλοι οι απόγονοι κάτω από τις επιλεγμένες ρίζες. Όταν είναι ανενεργό, επιτρέπονται μόνο τα άμεσα παιδιά τους."
PLG_FIELDS_TAGSELECT_FIELD_LEAF_ONLY_LABEL="Μόνο leaf tags"
PLG_FIELDS_TAGSELECT_FIELD_LEAF_ONLY_DESC="Όταν είναι ενεργό, επιτρέπονται μόνο tags που δεν έχουν παιδιά μέσα στο επιτρεπτό subtree."
PLG_FIELDS_TAGSELECT_FIELD_ALLOW_TAG_CREATION_LABEL="Επιτρέπεται δημιουργία tags"
PLG_FIELDS_TAGSELECT_FIELD_ALLOW_TAG_CREATION_DESC="Όταν είναι ενεργό, ο editor μπορεί να δημιουργεί νέα tags από το field. Path input όπως Parent/Child δημιουργεί το Child κάτω από υπάρχον Parent όταν αυτό μπορεί να λυθεί με ασφάλεια."
PLG_FIELDS_TAGSELECT_FIELD_ALLOW_ROOT_LEVEL_CREATION_LABEL="Επιτρέπεται δημιουργία root-level tags"
PLG_FIELDS_TAGSELECT_FIELD_ALLOW_ROOT_LEVEL_CREATION_DESC="Όταν είναι ενεργό, plain input χωρίς explicit parent path μπορεί να δημιουργεί top-level tags. Σε restricted fields, αυτά τα root-level tags γίνονται και selectable."
PLG_FIELDS_TAGSELECT_INVALID_SELECTION_LABEL="[Δεν επιτρέπεται πλέον] %s"
PLG_FIELDS_TAGSELECT_INVALID_SELECTION_MISSING="Tag #%d"
