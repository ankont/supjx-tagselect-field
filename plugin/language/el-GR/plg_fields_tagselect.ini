PLG_FIELDS_TAGSELECT="Πεδία - Επιλογή Ετικετών"
PLG_FIELDS_TAGSELECT_LABEL="Tag Select (%s)"
PLG_FIELDS_TAGSELECT_XML_DESCRIPTION="Προσθέτει τον custom field type tagselect για επιλογή Joomla tags με ρυθμιζόμενο scope branches, προαιρετική χρήση native article tags, επιλογή μόνο leaf tags και ελεγχόμενη δημιουργία νέων tags."
PLG_FIELDS_TAGSELECT_FIELD_MULTIPLE_LABEL="Να επιτρέπεται επιλογή πολλαπλών ετικετών"
PLG_FIELDS_TAGSELECT_FIELD_MULTIPLE_DESC="Όταν είναι ενεργό, ο editor μπορεί να επιλέγει περισσότερες από μία υπάρχουσες ετικέτες."
PLG_FIELDS_TAGSELECT_FIELD_TYPE_LABEL="Τύπος field"
PLG_FIELDS_TAGSELECT_FIELD_TYPE_DESC="Επίλεξε αν το field θα αποθηκεύει ανεξάρτητη τιμή custom field ή αν θα λειτουργεί σαν UI layer πάνω στα native Joomla tags του άρθρου."
PLG_FIELDS_TAGSELECT_FIELD_TYPE_OPTION_INDEPENDENT="Independent Tag Mode"
PLG_FIELDS_TAGSELECT_FIELD_TYPE_OPTION_NATIVE_ARTICLE_TAGS="Native Article Tag Handler"
PLG_FIELDS_TAGSELECT_FIELD_MODE_LABEL="Τρόπος επιλογής"
PLG_FIELDS_TAGSELECT_FIELD_MODE_DESC="Το AJAX mode είναι προτιμότερο για searchable flat selector. Το Nested mode δείχνει άμεσα την ιεραρχία. Όταν ενεργοποιούνται περιορισμοί subtree ή leaf-only, το field εφαρμόζει τους ίδιους κανόνες επιτρεπτών tags και στα δύο modes."
PLG_FIELDS_TAGSELECT_FIELD_MODE_OPTION_AJAX="AJAX (προτιμότερο)"
PLG_FIELDS_TAGSELECT_FIELD_MODE_OPTION_NESTED="Nested"
PLG_FIELDS_TAGSELECT_FIELD_TAG_SCOPE_MODE_LABEL="Scope ετικετών"
PLG_FIELDS_TAGSELECT_FIELD_TAG_SCOPE_MODE_DESC="Επίλεξε αν το field θα δείχνει όλα τα tags, μόνο τα επιλεγμένα branches ή όλα τα tags εκτός από τα επιλεγμένα branches. Το exclude mode αφαιρεί πάντα ολόκληρα branches. Στο Native Article Tag Handler και το include mode ισχύει πάντα για ολόκληρα subtrees."
PLG_FIELDS_TAGSELECT_FIELD_TAG_SCOPE_MODE_OPTION_ALL="Όλα τα tags"
PLG_FIELDS_TAGSELECT_FIELD_TAG_SCOPE_MODE_OPTION_INCLUDE="Μόνο τα επιλεγμένα branches"
PLG_FIELDS_TAGSELECT_FIELD_TAG_SCOPE_MODE_OPTION_EXCLUDE="Όλα εκτός από τα επιλεγμένα branches"
PLG_FIELDS_TAGSELECT_FIELD_SCOPE_ROOT_IDS_LABEL="Scope root tag(s)"
PLG_FIELDS_TAGSELECT_FIELD_SCOPE_ROOT_IDS_DESC="Προαιρετικό. Επίλεξε ένα ή περισσότερα root tags που θα χρησιμοποιηθούν από το τρέχον Tag Scope. Αυτός ο selector ακολουθεί το ίδιο mode με το field. Αν το Tag Scope είναι Όλα τα tags, αυτά τα roots αγνοούνται."
PLG_FIELDS_TAGSELECT_FIELD_INCLUDE_DESCENDANTS_LABEL="Συμπερίληψη απογόνων"
PLG_FIELDS_TAGSELECT_FIELD_INCLUDE_DESCENDANTS_DESC="Μόνο για Independent Tag Mode. Όταν το Tag Scope είναι Μόνο τα επιλεγμένα branches, καθορίζει αν θα επιτρέπεται όλο το subtree ή μόνο τα άμεσα παιδιά των επιλεγμένων roots."
PLG_FIELDS_TAGSELECT_FIELD_LEAF_ONLY_LABEL="Μόνο leaf tags"
PLG_FIELDS_TAGSELECT_FIELD_LEAF_ONLY_DESC="Όταν είναι ενεργό, επιτρέπονται μόνο tags που δεν έχουν παιδιά μέσα στο επιτρεπτό subtree."
PLG_FIELDS_TAGSELECT_FIELD_ALLOW_TAG_CREATION_LABEL="Να επιτρέπεται δημιουργία tags"
PLG_FIELDS_TAGSELECT_FIELD_ALLOW_TAG_CREATION_DESC="Όταν είναι ενεργό, ο editor μπορεί να δημιουργεί νέα tags από αυτό το field. Path input όπως Parent/Child δημιουργεί το Child κάτω από υπάρχον Parent όταν αυτό μπορεί να λυθεί με ασφάλεια."
PLG_FIELDS_TAGSELECT_FIELD_ALLOW_ROOT_LEVEL_CREATION_LABEL="Να επιτρέπεται δημιουργία root-level tags"
PLG_FIELDS_TAGSELECT_FIELD_ALLOW_ROOT_LEVEL_CREATION_DESC="Όταν είναι ενεργό, plain input χωρίς explicit parent path μπορεί να δημιουργεί top-level tags. Σε restricted fields αυτά τα root-level tags γίνονται και selectable."
PLG_FIELDS_TAGSELECT_INVALID_SELECTION_LABEL="[Δεν επιτρέπεται πλέον] %s"
PLG_FIELDS_TAGSELECT_INVALID_SELECTION_MISSING="Tag #%d"
