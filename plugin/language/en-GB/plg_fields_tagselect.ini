PLG_FIELDS_TAGSELECT="Fields - Tag Select"
PLG_FIELDS_TAGSELECT_LABEL="Tag Select (%s)"
PLG_FIELDS_TAGSELECT_XML_DESCRIPTION="Adds the tagselect custom field type for choosing Joomla tags with optional multi-branch restrictions, leaf-only selection and controlled tag creation."
PLG_FIELDS_TAGSELECT_FIELD_MULTIPLE_LABEL="Allow multiple tags"
PLG_FIELDS_TAGSELECT_FIELD_MULTIPLE_DESC="When enabled, editors can select more than one existing tag."
PLG_FIELDS_TAGSELECT_FIELD_MODE_LABEL="Selector mode"
PLG_FIELDS_TAGSELECT_FIELD_MODE_DESC="AJAX mode is preferred for a searchable flat selector. Nested mode shows the hierarchy directly. When subtree or leaf restrictions are active, the field still applies the same allowed-tag rules in both modes."
PLG_FIELDS_TAGSELECT_FIELD_MODE_OPTION_AJAX="AJAX (preferred)"
PLG_FIELDS_TAGSELECT_FIELD_MODE_OPTION_NESTED="Nested"
PLG_FIELDS_TAGSELECT_FIELD_ROOT_PARENT_ID_LABEL="Root parent tag(s)"
PLG_FIELDS_TAGSELECT_FIELD_ROOT_PARENT_ID_DESC="Optional. Select one or more parent tags to limit the field to those branches. This selector follows the same mode as the field itself. When empty, the field can use the full tag tree."
PLG_FIELDS_TAGSELECT_FIELD_INCLUDE_DESCENDANTS_LABEL="Include descendants"
PLG_FIELDS_TAGSELECT_FIELD_INCLUDE_DESCENDANTS_DESC="When enabled, all descendants under the selected root parent tags can be chosen. When disabled, only the direct children of those roots are selectable."
PLG_FIELDS_TAGSELECT_FIELD_LEAF_ONLY_LABEL="Leaf tags only"
PLG_FIELDS_TAGSELECT_FIELD_LEAF_ONLY_DESC="When enabled, only tags without children inside the allowed subtree can be selected."
PLG_FIELDS_TAGSELECT_FIELD_ALLOW_TAG_CREATION_LABEL="Allow tag creation"
PLG_FIELDS_TAGSELECT_FIELD_ALLOW_TAG_CREATION_DESC="When enabled, editors can create new tags from this field. Explicit path input such as Parent/Child creates Child under an existing Parent when that parent can be resolved safely."
PLG_FIELDS_TAGSELECT_FIELD_ALLOW_ROOT_LEVEL_CREATION_LABEL="Allow root-level tag creation"
PLG_FIELDS_TAGSELECT_FIELD_ALLOW_ROOT_LEVEL_CREATION_DESC="When enabled, plain input without an explicit parent path may create top-level tags. In restricted fields, those root-level tags also become selectable."
PLG_FIELDS_TAGSELECT_INVALID_SELECTION_LABEL="[No longer allowed] %s"
PLG_FIELDS_TAGSELECT_INVALID_SELECTION_MISSING="Tag #%d"
