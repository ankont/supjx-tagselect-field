PLG_FIELDS_TAGSELECT="Fields - Tag Select"
PLG_FIELDS_TAGSELECT_LABEL="Tag Select (%s)"
PLG_FIELDS_TAGSELECT_XML_DESCRIPTION="Adds the tagselect custom field type for choosing Joomla tags with configurable branch scoping, optional native article-tag storage, leaf-only selection and controlled tag creation."
PLG_FIELDS_TAGSELECT_FIELD_MULTIPLE_LABEL="Allow multiple tags"
PLG_FIELDS_TAGSELECT_FIELD_MULTIPLE_DESC="When enabled, editors can select more than one existing tag."
PLG_FIELDS_TAGSELECT_FIELD_TYPE_LABEL="Field type"
PLG_FIELDS_TAGSELECT_FIELD_TYPE_DESC="Choose whether the field stores its own independent custom-field value or acts as a UI layer over the article's native Joomla tags."
PLG_FIELDS_TAGSELECT_FIELD_TYPE_OPTION_INDEPENDENT="Independent Tag Mode"
PLG_FIELDS_TAGSELECT_FIELD_TYPE_OPTION_NATIVE_ARTICLE_TAGS="Native Article Tag Handler"
PLG_FIELDS_TAGSELECT_FIELD_MODE_LABEL="Selector mode"
PLG_FIELDS_TAGSELECT_FIELD_MODE_DESC="AJAX mode is preferred for a searchable flat selector. Nested mode shows the hierarchy directly. When subtree or leaf restrictions are active, the field still applies the same allowed-tag rules in both modes."
PLG_FIELDS_TAGSELECT_FIELD_MODE_OPTION_AJAX="AJAX (preferred)"
PLG_FIELDS_TAGSELECT_FIELD_MODE_OPTION_NESTED="Nested"
PLG_FIELDS_TAGSELECT_FIELD_TAG_SCOPE_MODE_LABEL="Tag scope"
PLG_FIELDS_TAGSELECT_FIELD_TAG_SCOPE_MODE_DESC="Choose whether the field shows all tags, only selected branches, or all tags except selected branches. Exclude mode always removes whole branches. In Native Article Tag Handler mode, include mode also always applies to full subtrees."
PLG_FIELDS_TAGSELECT_FIELD_TAG_SCOPE_MODE_OPTION_ALL="All tags"
PLG_FIELDS_TAGSELECT_FIELD_TAG_SCOPE_MODE_OPTION_INCLUDE="Only selected branches"
PLG_FIELDS_TAGSELECT_FIELD_TAG_SCOPE_MODE_OPTION_EXCLUDE="All except selected branches"
PLG_FIELDS_TAGSELECT_FIELD_SCOPE_ROOT_IDS_LABEL="Scope root tag(s)"
PLG_FIELDS_TAGSELECT_FIELD_SCOPE_ROOT_IDS_DESC="Optional. Select one or more root tags used by the current Tag Scope. This selector follows the same mode as the field itself. If Tag Scope is set to All tags, these roots are ignored."
PLG_FIELDS_TAGSELECT_FIELD_INCLUDE_DESCENDANTS_LABEL="Include descendants"
PLG_FIELDS_TAGSELECT_FIELD_INCLUDE_DESCENDANTS_DESC="Independent Tag Mode only. When Tag Scope is set to Only selected branches, this controls whether the whole subtree is selectable or only the direct children of the chosen roots."
PLG_FIELDS_TAGSELECT_FIELD_LEAF_ONLY_LABEL="Leaf tags only"
PLG_FIELDS_TAGSELECT_FIELD_LEAF_ONLY_DESC="When enabled, only tags without children inside the allowed subtree can be selected."
PLG_FIELDS_TAGSELECT_FIELD_ALLOW_TAG_CREATION_LABEL="Allow tag creation"
PLG_FIELDS_TAGSELECT_FIELD_ALLOW_TAG_CREATION_DESC="When enabled, editors can create new tags from this field. Explicit path input such as Parent/Child creates Child under an existing Parent when that parent can be resolved safely."
PLG_FIELDS_TAGSELECT_FIELD_ALLOW_ROOT_LEVEL_CREATION_LABEL="Allow root-level tag creation"
PLG_FIELDS_TAGSELECT_FIELD_ALLOW_ROOT_LEVEL_CREATION_DESC="When enabled, plain input without an explicit parent path may create top-level tags. In restricted fields, those root-level tags also become selectable."
PLG_FIELDS_TAGSELECT_INVALID_SELECTION_LABEL="[No longer allowed] %s"
PLG_FIELDS_TAGSELECT_INVALID_SELECTION_MISSING="Tag #%d"
